<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>미래 소비 시뮬레이터</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 다크모드 토글 -->
  <div class="theme-toggle">
    🌙 <label class="switch">
      <input type="checkbox" id="themeToggle">
      <span class="slider"></span>
    </label> ☀️
  </div>

  <div class="container">
    <h1>미래 소비 시뮬레이터</h1>

    <div class="input-group">
      <label>월 수입</label>
      <div class="input-row">
        <input type="number" id="income" step="10">
        <span>만원</span>
      </div>
    </div>

    <div class="input-group">
      <label>월 소비</label>
      <div class="input-row">
        <input type="number" id="expense" step="10">
        <span>만원</span>
      </div>
    </div>

    <button onclick="goResult()">결과 보기</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
